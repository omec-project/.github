name: Docker Build

on:
  workflow_call:
    inputs:
      branch_name:
        description: "Name of the branch to checkout"
        required: false
        type: string
        default: ${{ github.ref }}
      build_directory:
        description: "Directory where to run the build command from"
        required: false
        type: string
        default: '.'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch_name }}

      - name: Check for Go project
        id: check-go
        run: |
          if [ -f "go.mod" ]; then
            echo "go-project=true" >> $GITHUB_OUTPUT
            echo "Go project detected"
          else
            echo "go-project=false" >> $GITHUB_OUTPUT
            echo "No Go project detected"
          fi

      - name: Setup Go
        if: steps.check-go.outputs.go-project == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build Docker image
        run: make docker-build
        working-directory: ${{ inputs.build_directory }}
