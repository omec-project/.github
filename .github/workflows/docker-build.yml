name: Docker Build

on:
  workflow_call:
    inputs:
      branch_name:
        description: "Name of the branch to checkout"
        required: false
        type: string
        default: ${{ github.ref }}
      build_directory:
        description: "Directory where to run the build command from"
        required: false
        type: string
        default: '.'
      build_command:
        description: "Trusted make command used to build the Docker image"
        required: false
        type: string
        default: 'make docker-build'
      pre_build_command:
        description: "Optional trusted make command to run before building the Docker image"
        required: false
        type: string
        default: ''
      docker_targets:
        description: "Whitespace-separated Docker build targets"
        required: false
        type: string
        default: ''

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch_name }}

      - name: Check for Go project
        id: check-go
        working-directory: ${{ inputs.build_directory }}
        run: |
          if [ -f "go.mod" ]; then
            echo "go-project=true" >> $GITHUB_OUTPUT
            echo "Go project detected"
          else
            echo "go-project=false" >> $GITHUB_OUTPUT
            echo "No Go project detected"
          fi

      - name: Setup Go
        if: steps.check-go.outputs.go-project == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ format('{0}/go.mod', inputs.build_directory) }}
          cache: true

      - name: Run pre-build command
        if: inputs.pre_build_command != ''
        env:
          PRE_BUILD_COMMAND: ${{ inputs.pre_build_command }}
        run: |
          if ! echo "${PRE_BUILD_COMMAND}" | grep -Eq '^make( [A-Za-z0-9_.-]+)+$'; then
            echo "Error: pre_build_command must be a trusted make invocation with safe target names."
            exit 1
          fi

          bash -lc "${PRE_BUILD_COMMAND}"
        working-directory: ${{ inputs.build_directory }}

      - name: Build Docker image
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
          DOCKER_TARGETS: ${{ inputs.docker_targets }}
        run: |
          if ! echo "${BUILD_COMMAND}" | grep -Eq '^make( [A-Za-z0-9_.-]+)+$'; then
            echo "Error: build_command must be a trusted make invocation with safe target names."
            exit 1
          fi

          if [ -n "${DOCKER_TARGETS}" ]; then
            set -f
            IFS=' ' read -r -a targets <<< "${DOCKER_TARGETS}"
            for target in "${targets[@]}"; do
              if ! echo "${target}" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
                echo "Error: docker_targets entries must contain only letters, numbers, underscores, dots, and dashes."
                exit 1
              fi

              DOCKER_TARGETS="${target}" ${BUILD_COMMAND}
            done
          else
            ${BUILD_COMMAND}
          fi
        working-directory: ${{ inputs.build_directory }}
