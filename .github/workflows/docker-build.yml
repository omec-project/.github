name: Docker Build

on:
  workflow_call:
    inputs:
      branch_name:
        description: "Name of the branch to checkout"
        required: false
        type: string
        default: ${{ github.ref }}
      build_directory:
        description: "Directory where to run the build command from"
        required: false
        type: string
        default: '.'
      build_command:
        description: "Command used to build the Docker image"
        required: false
        type: string
        default: 'make docker-build'
      pre_build_command:
        description: "Optional command to run before building the Docker image"
        required: false
        type: string
        default: ''
      docker_targets:
        description: "Whitespace-separated Docker build targets"
        required: false
        type: string
        default: ''

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch_name }}

      - name: Check for Go project
        id: check-go
        working-directory: ${{ inputs.build_directory }}
        run: |
          if [ -f "go.mod" ]; then
            echo "go-project=true" >> $GITHUB_OUTPUT
            echo "Go project detected"
          else
            echo "go-project=false" >> $GITHUB_OUTPUT
            echo "No Go project detected"
          fi

      - name: Setup Go
        if: steps.check-go.outputs.go-project == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ format('{0}/go.mod', inputs.build_directory) }}
          cache: true

      - name: Run pre-build command
        if: inputs.pre_build_command != ''
        run: ${{ inputs.pre_build_command }}
        working-directory: ${{ inputs.build_directory }}

      - name: Build Docker image
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
          DOCKER_TARGETS: ${{ inputs.docker_targets }}
        run: |
          if [ -n "${DOCKER_TARGETS}" ]; then
            for target in ${DOCKER_TARGETS}; do
              DOCKER_TARGETS="${target}" ${BUILD_COMMAND}
            done
          else
            ${BUILD_COMMAND}
          fi
        working-directory: ${{ inputs.build_directory }}
