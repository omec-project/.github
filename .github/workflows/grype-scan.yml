name: Grype Scan
on:
  workflow_call:
    inputs:
      changed:
        required: true
        type: string
      artifact_name:
        description: "Name of the SBOM artifact to download and scan"
        required: true
        type: string
      severity_cutoff:
        description: "Minimum severity to report (negligible, low, medium, high, critical)"
        required: false
        type: string
        default: medium
      fail_build:
        description: "Fail the workflow if vulnerabilities at or above the severity cutoff are found"
        required: false
        type: boolean
        default: true
      only_fixed:
        description: "Only report vulnerabilities that have a known fix"
        required: false
        type: boolean
        default: false
      output_format:
        description: "Grype output format (table, json, cyclonedx-json, sarif)"
        required: false
        type: string
        default: sarif
      upload_sarif:
        description: "Upload SARIF results to GitHub Code Scanning (requires sarif output format)"
        required: false
        type: boolean
        default: true
jobs:
  grype:
    runs-on: ubuntu-latest
    if: ${{ inputs.changed == 'true' }}
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/sbom

      - name: Locate SBOM file
        id: sbom-file
        run: |
          SBOM_FILE=$(find "${{ runner.temp }}/sbom" -type f | head -n 1)
          if [ -z "$SBOM_FILE" ]; then
            echo "::error::No SBOM file found in the downloaded artifact"
            exit 1
          fi
          echo "path=${SBOM_FILE}" >> "$GITHUB_OUTPUT"
          echo "Found SBOM: ${SBOM_FILE}"

      - name: Scan SBOM with Grype
        id: grype-scan
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ steps.sbom-file.outputs.path }}
          severity-cutoff: ${{ inputs.severity_cutoff }}
          fail-build: ${{ inputs.fail_build }}
          only-fixed: ${{ inputs.only_fixed }}
          output-format: ${{ inputs.output_format }}

      - name: Checkout repository for SARIF scan
        if: ${{ inputs.upload_sarif && inputs.output_format == 'sarif' && always() }}
        uses: actions/checkout@v7

      - name: Scan source for GitHub Code Scanning SARIF
        if: ${{ inputs.upload_sarif && inputs.output_format == 'sarif' && always() }}
        id: grype-scan-sarif
        uses: anchore/scan-action@v7
        with:
          path: "."
          severity-cutoff: ${{ inputs.severity_cutoff }}
          fail-build: false
          only-fixed: ${{ inputs.only_fixed }}
          output-format: sarif

      - name: Normalize SARIF for GitHub Code Scanning
        if: ${{ inputs.upload_sarif && inputs.output_format == 'sarif' && always() }}
        env:
          SARIF_FILE: ${{ steps.grype-scan-sarif.outputs.sarif }}
          FALLBACK_URI: VERSION
        run: |
          if [ -z "${SARIF_FILE}" ] || [ ! -f "${SARIF_FILE}" ]; then
            echo "::error::SARIF file not found at '${SARIF_FILE}'"
            exit 1
          fi

          if [ ! -f "${FALLBACK_URI}" ]; then
            FALLBACK_URI="$(git ls-files | head -n 1)"
          fi
          if [ -z "${FALLBACK_URI}" ]; then
            echo "::error::Could not determine a fallback URI for SARIF locations"
            exit 1
          fi

          tmp_file="${RUNNER_TEMP}/grype-normalized.sarif"
          jq '
            def normalize_loc:
              .physicalLocation.artifactLocation.uri as $uri
              | .physicalLocation.artifactLocation = (.physicalLocation.artifactLocation // {})
              | .physicalLocation.artifactLocation.uri = (
                  if ($uri == null)
                    or (($uri | type) != "string")
                    or (($uri | length) == 0)
                    or ($uri | test("^[A-Za-z][A-Za-z0-9+.-]*:"))
                    or ($uri | startswith("/"))
                  then env.FALLBACK_URI
                  else $uri
                  end
                )
              | del(.physicalLocation.artifactLocation.index)
              | del(.physicalLocation.artifactLocation.uriBaseId)
              | .physicalLocation.region.startLine = (.physicalLocation.region.startLine // 1)
              | .physicalLocation.region.startColumn = (.physicalLocation.region.startColumn // 1);

            (.runs[]?.results[]?) |= (
              if ((((.locations // []) | type) == "array") and (((.locations // []) | length) > 0)) then
                .locations |= map((. // {}) | normalize_loc)
              else
                .locations = [
                  {
                    physicalLocation: {
                      artifactLocation: {
                        uri: env.FALLBACK_URI
                      },
                      region: {
                        startLine: 1,
                        startColumn: 1
                      }
                    }
                  }
                ]
              end
            )
          ' "${SARIF_FILE}" > "${tmp_file}"

          mv "${tmp_file}" "${SARIF_FILE}"

      - name: Validate normalized SARIF result locations
        if: ${{ inputs.upload_sarif && inputs.output_format == 'sarif' && always() }}
        env:
          SARIF_FILE: ${{ steps.grype-scan-sarif.outputs.sarif }}
        run: |
          invalid_count=$(jq '
            [
              .runs[]?.results[]?
              | select(
                  ((.locations // []) | length) == 0
                  or any(.locations[]?;
                    ((.physicalLocation.artifactLocation.uri? // "") | type != "string")
                    or ((.physicalLocation.artifactLocation.uri? // "") | length == 0)
                    or ((.physicalLocation.artifactLocation.uri? // "") | test("^[A-Za-z][A-Za-z0-9+.-]*:"))
                    or ((.physicalLocation.artifactLocation.uri? // "") | startswith("/"))
                  )
                )
            ]
            | length
          ' "${SARIF_FILE}")

          if [ "${invalid_count}" != "0" ]; then
            echo "::error::Normalized SARIF still contains ${invalid_count} invalid result locations"
            exit 1
          fi

      - name: Upload Grype SARIF to GitHub Code Scanning
        if: ${{ inputs.upload_sarif && inputs.output_format == 'sarif' && always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype-scan-sarif.outputs.sarif }}

      - name: Upload Grype results as artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: grype-vulnerability-report
          path: ${{ steps.grype-scan-sarif.outputs.sarif || steps.grype-scan.outputs.sarif || steps.grype-scan.outputs.json }}
          retention-days: 30
